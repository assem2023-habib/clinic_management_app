<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&amp;family=Noto+Kufi+Arabic:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Noto Kufi Arabic', 'Sora', sans-serif;
            background-color: #00180b;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(27, 59, 41, 0.4);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glow-pulse {
            animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.1); }
        }

        .progress-ring__circle {
            transition: stroke-dashoffset 0.8s ease-in-out;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }

        .particle {
            position: absolute;
            background: #10b981;
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            z-index: -1;
        }

        @keyframes float-fade {
            0% { 
                transform: translate(0, 0); 
                opacity: 0;
            }
            15% {
                opacity: 0.4;
            }
            85% {
                opacity: 0.4;
            }
            100% { 
                transform: translate(var(--tw-x), var(--tw-y)); 
                opacity: 0;
            }
        }
    </style>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-error": "#690005",
                        "tertiary-container": "#00b982",
                        "surface-tint": "#4edea3",
                        "error-container": "#93000a",
                        "on-primary": "#003824",
                        "surface-container-lowest": "#001207",
                        "inverse-primary": "#006c49",
                        "on-primary-fixed": "#002113",
                        "on-tertiary-container": "#00422c",
                        "on-primary-container": "#00422b",
                        "on-tertiary-fixed-variant": "#005137",
                        "on-tertiary": "#003825",
                        "surface-dim": "#00180b",
                        "surface-container-low": "#002111",
                        "secondary-container": "#0b513d",
                        "secondary-fixed": "#b0f0d6",
                        "secondary": "#95d3ba",
                        "primary-container": "#10b981",
                        "outline-variant": "#3c4a42",
                        "inverse-on-surface": "#163725",
                        "background": "#00180b",
                        "tertiary-fixed": "#68fcbf",
                        "surface-bright": "#1f402d",
                        "surface-variant": "#1b3b29",
                        "on-secondary-fixed": "#002117",
                        "on-surface": "#c6ebd1",
                        "surface-container-high": "#0f301f",
                        "primary": "#4edea3",
                        "on-secondary-fixed-variant": "#0b513d",
                        "on-secondary": "#003829",
                        "secondary-fixed-dim": "#95d3ba",
                        "surface-container-highest": "#1b3b29",
                        "primary-fixed": "#6ffbbe",
                        "on-tertiary-fixed": "#002114",
                        "primary-fixed-dim": "#4edea3",
                        "inverse-surface": "#c6ebd1",
                        "tertiary-fixed-dim": "#45dfa4",
                        "on-primary-fixed-variant": "#005236",
                        "on-background": "#c6ebd1",
                        "outline": "#86948a",
                        "surface": "#00180b",
                        "on-secondary-container": "#83c2a9",
                        "tertiary": "#45dfa4",
                        "on-surface-variant": "#bbcabf",
                        "surface-container": "#032515",
                        "on-error-container": "#ffdad6",
                        "error": "#ffb4ab"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "xl": "64px",
                        "xs": "4px",
                        "lg": "40px",
                        "sm": "12px",
                        "md": "24px",
                        "margin-desktop": "48px",
                        "gutter": "16px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-lg-mobile": ["Sora"],
                        "headline-xl": ["Sora"],
                        "body-md": ["Sora"],
                        "body-lg": ["Sora"],
                        "headline-md": ["Sora"],
                        "label-sm": ["Sora"],
                        "label-md": ["Sora"],
                        "headline-lg": ["Sora"]
                    },
                    "fontSize": {
                        "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "600"}],
                        "headline-xl": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                }
            }
        }

</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col items-center justify-center p-margin-mobile relative">
<!-- Ambient Background Elements -->
<div class="fixed inset-0 pointer-events-none z-[-2] overflow-hidden" id="pulsing-background">
<style>
        .pulse-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            animation: pulse-expand 8s linear infinite;
        }
        @keyframes pulse-expand {
            0% { width: 0; height: 0; opacity: 0.5; }
            100% { width: 150vmax; height: 150vmax; opacity: 0; }
        }
        .pulse-circle:nth-child(2) { animation-delay: 2s; }
        .pulse-circle:nth-child(3) { animation-delay: 4s; }
        .pulse-circle:nth-child(4) { animation-delay: 6s; }
        
        .breathing-icon {
            animation: breathing 3s ease-in-out infinite;
        }
        @keyframes breathing {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
<div class="pulse-circle"></div><div class="pulse-circle"></div><div class="pulse-circle"></div><div class="pulse-circle"></div></div>
<div class="fixed inset-0 pointer-events-none overflow-hidden z-[-1]" id="particle-container"></div>
<div class="fixed top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary/10 rounded-full blur-[120px] glow-pulse"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[350px] h-[350px] bg-tertiary/10 rounded-full blur-[100px] glow-pulse"></div>
<!-- Main Content Container -->
<main class="w-full max-w-lg z-10 flex flex-col items-center gap-lg">
<!-- Header Section -->
<header class="text-center space-y-sm">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface tracking-tight">تحليل البيانات الصحية</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto opacity-80">
                جاري إنشاء تقريرك الصحي الشامل باستخدام الذكاء الاصطناعي...
            </p>
</header>
<!-- Central Analysis Card -->
<div class="glass-card w-full p-lg rounded-full shadow-[0_0_40px_rgba(16,185,129,0.08)] flex flex-col items-center relative">
<!-- Progress Ring -->
<div class="relative w-48 h-48 mb-md">
<svg class="w-full h-full" viewbox="0 0 100 100">
<circle class="text-white/5 stroke-current" cx="50" cy="50" fill="transparent" r="42" stroke-width="6"></circle>
<circle class="text-primary-container stroke-current progress-ring__circle" cx="50" cy="50" fill="transparent" id="progress-circle" r="42" stroke-linecap="round" stroke-width="6" style="stroke-dasharray: 263.89; stroke-dashoffset: 73.89;"></circle>
</svg>
<div class="absolute inset-0 flex flex-col items-center justify-center"><div class="flex flex-col items-center justify-center breathing-icon">
<span class="material-symbols-outlined text-primary text-[40px] mb-1" style="font-variation-settings: 'FILL' 1, 'wght' 300;">memory</span>
<span class="font-headline-xl text-headline-xl text-primary leading-none" id="percentage">72%</span>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest mt-1">مكتمل</span>
</div></div>
</div>
<!-- Analysis Status Chip -->
<div class="bg-surface-container-highest px-md py-sm rounded-full flex items-center gap-sm border border-white/5 mb-base breathing-icon">
<span class="material-symbols-outlined text-primary text-[18px] animate-spin" style="font-variation-settings: 'FILL' 1;">psychology</span>
<p class="font-label-md text-label-md text-primary">الذكاء الاصطناعي يحلل البيانات...</p>
</div>
<p class="font-body-md text-body-md text-on-surface-variant opacity-60 text-center">
                يتم الآن معالجة 48 نقطة بيانية حيوية
            </p>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-sm">
<button class="w-full h-14 bg-primary text-on-primary font-label-md text-label-md rounded-full shadow-lg shadow-primary/20 hover:scale-[0.98] transition-all duration-300">
                المتابعة في الخلفية
            </button>
<button class="w-full h-14 bg-white/5 text-on-surface font-label-md text-label-md rounded-full border border-white/10 hover:bg-white/10 transition-all duration-300">
                إلغاء العملية
            </button>
</div>
<!-- Compliance & Security Footer -->
<footer class="w-full pt-md border-t border-white/5 flex justify-between items-center px-base">
<div class="flex items-center gap-sm opacity-60">
<div class="w-8 h-8 rounded-lg bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-[16px]">lock</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-[10px] text-on-surface">خصوصية AI</span>
<span class="font-label-sm text-[8px] text-on-surface-variant">مشفر تماماً</span>
</div>
</div>
<div class="flex items-center gap-sm opacity-60">
<div class="w-8 h-8 rounded-lg bg-surface-variant flex items-center justify-center">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
</div>
<div class="flex flex-col">
<span class="font-label-sm text-[10px] text-on-surface">تشفير PDF</span>
<span class="font-label-sm text-[8px] text-on-surface-variant">معيار طبي عالي</span>
</div>
</div>
</footer>
</main>
<script>
        // Particle System
        const container = document.getElementById('particle-container');
        const particleCount = 20;

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 4 + 2;
            const startX = Math.random() * 100;
            const startY = Math.random() * 100;
            const moveX = (Math.random() - 0.5) * 100;
            const moveY = (Math.random() - 0.5) * 100;
            const duration = Math.random() * 8000 + 7000;
            const delay = Math.random() * 10000;

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${startX}%`;
            particle.style.top = `${startY}%`;
            particle.style.setProperty('--tw-x', `${moveX}px`);
            particle.style.setProperty('--tw-y', `${moveY}px`);
            
            particle.style.animation = `float-fade ${duration}ms ease-in-out ${delay}ms infinite`;
            
            container.appendChild(particle);
        }

        // Initialize particles
        for (let i = 0; i < particleCount; i++) {
            createParticle();
        }

        // Percentage Incrementor (Simulation)
        let currentPercent = 72;
        const percentElement = document.getElementById('percentage');
        const circleElement = document.getElementById('progress-circle');
        const radius = 42;
        const circumference = 2 * Math.PI * radius;

        function updateProgress(val) {
            const offset = circumference - (val / 100) * circumference;
            circleElement.style.strokeDashoffset = offset;
            percentElement.textContent = `${Math.floor(val)}%`;
        }

        // Initial set
        updateProgress(currentPercent);

        setInterval(() => {
            if (currentPercent < 99) {
                currentPercent += Math.random() * 0.5;
                updateProgress(currentPercent);
            }
        }, 2000);

        // Micro-interactions for buttons
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.transform = 'scale(0.95)';
            });
            btn.addEventListener('touchend', () => {
                btn.style.transform = 'scale(1)';
            });
        });
    </script>
</body></html>
