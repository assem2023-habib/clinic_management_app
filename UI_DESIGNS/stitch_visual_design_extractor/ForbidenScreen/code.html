<!-- Interactive Layer & Particle Script -->
<script>
        // Particle Background Generation
        const particleContainer = document.getElementById('particle-container');
        const particleCount = 65;

        function createParticles() {
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 2 + 1;
                const posX = Math.random() * 100;
                const posY = Math.random() * 100;
                const delay = Math.random() * 10;
                const duration = Math.random() * 10 + 10;
                const opacity = Math.random() * 0.4 + 0.1;
                
                // Random drift values
                const driftX = (Math.random() - 0.5) * 60;
                const driftY = (Math.random() - 0.5) * 60;

                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${posX}%`;
                particle.style.top = `${posY}%`;
                particle.style.opacity = opacity;
                particle.style.setProperty('--tw-translate-x', `${driftX}px`);
                particle.style.setProperty('--tw-translate-y', `${driftY}px`);
                
                particle.style.animation = `float-particle ${duration}s ease-in-out ${delay}s infinite alternate`;
                
                particleContainer.appendChild(particle);
            }
        }

        createParticles();

        // Mouse move effect for atmospheric glow
        document.addEventListener('mousemove', (e) => {
            const glow = document.querySelector('.absolute.top-1\\/2.left-1\\/2');
            if (glow) {
                const x = e.clientX;
                const y = e.clientY;
                glow.style.left = `${x}px`;
                glow.style.top = `${y}px`;
            }
        });

        // Ripple effect for buttons
        const buttons = document.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('click', function(e) {
                let ripple = document.createElement('span');
                ripple.classList.add('ripple');
                this.appendChild(ripple);
                const rect = this.getBoundingClientRect();
                let x = e.clientX - rect.left;
                let y = e.clientY - rect.top;
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });
    </script>
<style>
        .ripple {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            pointer-events: none;
            border-radius: 50%;
            animation: ripple-effect 0.6s linear;
            width: 0;
            height: 0;
        }
        @keyframes ripple-effect {
            to {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }
