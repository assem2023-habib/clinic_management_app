<body class="dark bg-surface text-on-surface flex flex-col justify-center items-center relative overflow-hidden">

<script>
        // Sophisticated Particle System
        const particleContainer = document.getElementById('particle-container');
        const particleCount = 60;

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 3 + 0.5;
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight;
            const opacity = Math.random() * 0.5 + 0.1;
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${startX}px`;
            particle.style.top = `${startY}px`;
            particle.style.opacity = opacity;
            
            particleContainer.appendChild(particle);

            const duration = (Math.random() * 30 + 20) * 1000;
            const delay = Math.random() * -duration;

            const xMove = (Math.random() - 0.5) * 100;
            const yMove = -150 - Math.random() * 200;

            particle.animate([
                { transform: 'translate(0, 0)', opacity: 0 },
                { transform: `translate(${xMove/2}px, ${yMove/2}px)`, opacity: opacity },
                { transform: `translate(${xMove}px, ${yMove}px)`, opacity: 0 }
            ], {
                duration: duration,
                delay: delay,
                iterations: Infinity,
                easing: 'linear'
            });
        }

        for (let i = 0; i < particleCount; i++) {
            createParticle();
        }

        window.addEventListener('resize', () => {
            particleContainer.innerHTML = '';
            for (let i = 0; i < particleCount; i++) {
                createParticle();
            }
        });
    </script>
