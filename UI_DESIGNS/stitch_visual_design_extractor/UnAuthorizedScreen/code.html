<style>
        body {
            font-family: 'Noto Sans Arabic', 'Sora', sans-serif;
            background-color: #00180b; /* base background */
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .emerald-glow {
            box-shadow: 0 0 40px -10px rgba(16, 185, 129, 0.15);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    
        @keyframes sophisticated-float {
            0%, 100% { transform: translateY(0) scale(1); filter: drop-shadow(0 0 20px rgba(78, 222, 163, 0.4)); }
            50% { transform: translateY(-15px) scale(1.05); filter: drop-shadow(0 0 35px rgba(78, 222, 163, 0.7)); }
        }
        .animate-sophisticated-float {
            animation: sophisticated-float 4s ease-in-out infinite;
        }

        /* Particle Background Styles */
        #particle-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: #10b981; /* emerald-500 equivalent */
            opacity: 0.3;
            filter: blur(2px);
        }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col overflow-x-hidden">
<!-- Dynamic Background -->
<div id="particle-container"></div>
<!-- TopAppBar (Based on JSON, Suppressed Avatar) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 border-outline-variant/10" style="background: transparent; border: none;"><div class="flex items-center justify-start h-full px-margin-mobile">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_forward</span>
</button>
</div></header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center pt-16 pb-xl px-margin-mobile relative z-10">
<div class="max-w-2xl w-full flex flex-col items-center text-center">
<!-- Visual Hero -->
<div class="relative w-64 h-64 md:w-80 md:h-80 mb-lg flex items-center justify-center">
<!-- Atmospheric background glow -->
<div class="absolute inset-0 bg-primary/5 blur-3xl rounded-full"></div>
<!-- Main Illustration -->
<span class="material-symbols-outlined relative z-10 text-primary drop-shadow-[0_0_20px_rgba(78,222,163,0.5)] text-[150px] md:text-[200px] animate-sophisticated-float">lock</span>
</div>
<!-- Content Header -->
<div class="space-y-sm mb-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-xs">
                    عذراً، الوصول غير مصرح
                </h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-lg mx-auto leading-relaxed">
                    يرجى تسجيل الدخول للوصول إلى هذه الصفحة والاستفادة من كافة الخدمات الطبية المتاحة.
                </p>
</div>
<!-- Actions Bento/Grid layout for buttons -->
<div class="flex flex-col md:flex-row items-center justify-center gap-md w-full animate-in fade-in slide-in-from-bottom-8 duration-1000">
<!-- Primary Action -->
<button class="w-full md:w-auto min-w-[200px] px-xl h-14 bg-primary text-on-primary font-label-md text-label-md rounded-full flex items-center justify-center gap-base emerald-glow hover:brightness-110 active:scale-95 transition-all duration-200 group">
<span class="material-symbols-outlined" data-icon="login">login</span>

                </button>
<!-- Secondary Action -->
<button class="w-full md:w-auto min-w-[200px] px-xl h-14 border border-outline/30 text-on-surface font-label-md text-label-md rounded-full flex items-center justify-center gap-base hover:bg-white/5 active:scale-95 transition-all duration-200">
                    العودة للرئيسية
                    <span class="material-symbols-outlined" data-icon="home">home</span>
</button>
</div>
<!-- Decorative Data Nodes (Ambient Medical Data Elements) -->
<div class="mt-xl grid grid-cols-2 md:grid-cols-3 gap-gutter opacity-40">
<div class="glass-panel p-sm rounded-xl flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-sm" data-icon="lock_open">lock_open</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">تشفير AES-256</span>
</div>
<div class="glass-panel p-sm rounded-xl flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-sm" data-icon="verified_user">verified_user</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">حماية البيانات</span>
</div>
<div class="hidden md:flex glass-panel p-sm rounded-xl items-center gap-xs">
<span class="material-symbols-outlined text-primary text-sm" data-icon="security">security</span>
<span class="font-label-sm text-label-sm text-on-surface-variant">بروتوكول آمن</span>
</div>
</div>
</div>
</main>
<!-- Footer Meta (Minimalist) -->
<footer class="py-md text-center border-t border-white/5 relative z-10">
<p class="font-label-sm text-label-sm text-on-surface-variant/50">
            Vitality Health Platform © 2024 • جميع الحقوق محفوظة
        </p>
</footer>
<script>
        // Background Particles Effect
        function createParticles() {
            const container = document.getElementById('particle-container');
            const particleCount = 25; // Subtle amount
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                // Random size between 2px and 6px
                const size = Math.random() * 4 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                // Random position
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.left = `${Math.random() * 100}%`;
                
                // Random opacity
                particle.style.opacity = Math.random() * 0.3 + 0.1;
                
                container.appendChild(particle);
                
                // Animate using Web Animations API for smooth performance
                animateParticle(particle);
            }
        }

        function animateParticle(el) {
            const duration = Math.random() * 20000 + 10000;
            const x = (Math.random() - 0.5) * 200;
            const y = (Math.random() - 0.5) * 200;
            
            el.animate([
                { transform: 'translate(0, 0)' },
                { transform: `translate(${x}px, ${y}px)` },
                { transform: 'translate(0, 0)' }
            ], {
                duration: duration,
                iterations: Infinity,
                easing: 'ease-in-out'
            });
        }

        // Simple animation sequence
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            
            const logo = document.querySelector('img');
            if (logo) {
                logo.style.transition = 'transform 3s ease-in-out';
                setInterval(() => {
                    logo.style.transform = logo.style.transform === 'translateY(-10px)' ? 'translateY(0px)' : 'translateY(-10px)';
                }, 3000);
            }
        });
    </script>
