<script>
        // Particle Background Generation
        const container = document.getElementById('particle-container');
        const particleCount = 40;

        for (let i = 0; i < particleCount; i++) {
            createParticle();
        }

        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            
            const size = Math.random() * 3 + 1;
            const posX = Math.random() * window.innerWidth;
            const posY = Math.random() * window.innerHeight;
            const duration = Math.random() * 20 + 10;
            const delay = Math.random() * -20;

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${posX}px`;
            particle.style.top = `${posY}px`;
            
            container.appendChild(particle);

            animateParticle(particle, duration, delay);
        }

        function animateParticle(el, duration, delay) {
            const xMove = (Math.random() - 0.5) * 200;
            const yMove = (Math.random() - 0.5) * 200;

            el.animate([
                { transform: `translate(0, 0)`, opacity: 0.1 },
                { transform: `translate(${xMove}px, ${yMove}px)`, opacity: 0.4 },
                { transform: `translate(${xMove * 1.5}px, ${yMove * 1.5}px)`, opacity: 0.1 }
            ], {
                duration: duration * 1000,
                delay: delay * 1000,
                iterations: Infinity,
                easing: 'ease-in-out'
            });
        }

        // Resize handler to reposition particles
        window.addEventListener('resize', () => {
            container.innerHTML = '';
            for (let i = 0; i < particleCount; i++) {
                createParticle();
            }
        });
    </script>
