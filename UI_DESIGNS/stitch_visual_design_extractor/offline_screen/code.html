<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Vitality Hub - Offline Mode</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&amp;family=Manrope:wght@400;500&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .glass-card {
            background: rgba(0, 33, 17, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgba(255, 255, 255, 0.2);
        }

        .neon-glow-mint {
            box-shadow: 0 0 20px rgba(0, 255, 133, 0.15);
        }

        .neon-glow-mint:hover {
            box-shadow: 0 0 40px rgba(0, 255, 133, 0.3);
        }

        body {
            background-color: #131313;
            background-image: radial-gradient(circle at 50% 50%, #002111 0%, #131313 100%);
            min-height: 100vh;
        }

        /* Subtle scanline effect for bio-tech feel */
        .scanlines::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 2;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "error-container": "#93000a",
                      "outline-variant": "#424843",
                      "on-secondary": "#003919",
                      "primary-fixed-dim": "#abcfb6",
                      "tertiary-fixed": "#ffdad5",
                      "on-tertiary-container": "#f9362c",
                      "secondary": "#f5fff2",
                      "secondary-container": "#36ff8b",
                      "background": "#131313",
                      "inverse-surface": "#e5e2e1",
                      "on-surface-variant": "#c2c8c1",
                      "primary": "#abcfb6",
                      "tertiary": "#ffb4aa",
                      "surface-variant": "#353534",
                      "on-primary-fixed-variant": "#2d4d3a",
                      "inverse-on-surface": "#313030",
                      "surface-container-lowest": "#0e0e0e",
                      "surface-bright": "#3a3939",
                      "inverse-primary": "#446651",
                      "on-background": "#e5e2e1",
                      "on-secondary-fixed": "#00210c",
                      "on-tertiary": "#690003",
                      "surface-dim": "#131313",
                      "outline": "#8c928c",
                      "on-primary": "#163725",
                      "on-error-container": "#ffdad6",
                      "surface-container-low": "#1c1b1b",
                      "on-tertiary-fixed": "#410001",
                      "surface-container-highest": "#353534",
                      "surface-container-high": "#2a2a2a",
                      "on-tertiary-fixed-variant": "#930005",
                      "primary-container": "#002111",
                      "secondary-fixed": "#61ff97",
                      "on-secondary-container": "#007238",
                      "on-primary-fixed": "#002111",
                      "on-error": "#690005",
                      "on-primary-container": "#698c75",
                      "tertiary-fixed-dim": "#ffb4aa",
                      "surface": "#131313",
                      "tertiary-container": "#410001",
                      "error": "#ffb4ab",
                      "on-surface": "#e5e2e1",
                      "primary-fixed": "#c6ebd1",
                      "secondary-fixed-dim": "#00e476",
                      "on-secondary-fixed-variant": "#005227",
                      "surface-container": "#201f1f",
                      "surface-tint": "#abcfb6"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "container-padding": "24px",
                      "gutter": "16px",
                      "stack-sm": "12px",
                      "stack-md": "24px",
                      "unit": "8px",
                      "stack-lg": "48px"
              },
              "fontFamily": {
                      "label-sm": ["JetBrains Mono"],
                      "headline-lg": ["Sora"],
                      "display-lg": ["Sora"],
                      "headline-lg-mobile": ["Sora"],
                      "body-md": ["Manrope"]
              },
              "fontSize": {
                      "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                      "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                      "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
              }
            },
          },
        }
    </script>
</head>
<body class="overflow-x-hidden">
<!-- Top Bar Component -->
<header class="fixed top-0 w-full bg-background/70 backdrop-blur-md z-50 flex items-center justify-between px-container-padding h-16 border-b border-white/15 shadow-[0_0_20px_rgba(171,207,182,0.1)]">
<button class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200" data-icon="arrow_back">arrow_back</button>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">Vitality Hub</span>
<div class="w-6"></div> <!-- Spacer for balance -->
</header>
<main class="scanlines relative min-h-screen flex flex-col items-center justify-center pt-16 px-container-padding pb-8">
<!-- Illustration Section -->
<div class="w-full max-w-md aspect-square relative mb-stack-lg animate-pulse duration-[3000ms]">
<img alt="Offline medical status" class="w-full h-full object-contain relative z-10 filter drop-shadow-[0_0_30px_rgba(0,255,133,0.2)]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBSeUtfQ8B9jy-BT5l7LjgFV_x82Y5dBqwrkXeIGya0Zd7-gG5jEZ7B5xC-CAfrxyQfcMJWUCnj1VRUFGa_1-uCjsmV5FPNuHXwqzxZMvzyec_OzweSM1TiYV6y7xJTSe7L6tFeitBlC9NiJq3GoLTYHb5_Qt00LbdEx3DefG-miD1k3bs7--8GV1JbDyCMezVQnweqPlNDRaDEQsFEzj05YBvU1kYM4Ky1zwCpK6_8dkG1v_zL-xIIWOktu_S-0IbNII2Za9X2P8k"/>
<!-- Background Glow Elements -->
<div class="absolute inset-0 bg-secondary-fixed-dim/5 blur-[100px] rounded-full"></div>
</div>
<!-- Content Card -->
<div class="glass-card w-full max-w-lg p-stack-md rounded-xl text-center space-y-stack-md relative z-20">
<div class="space-y-stack-sm">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary leading-tight">
                    عذراً، لا يوجد اتصال بالإنترنت
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[400px] mx-auto opacity-80">
                    يبدو أنك غير متصل بالشبكة حالياً. يرجى التحقق من إعدادات الواي فاي أو بيانات الهاتف والمحاولة مرة أخرى.
                </p>
</div>
<!-- Action Cluster -->
<div class="flex flex-col gap-unit pt-stack-sm">
<button class="bg-secondary-fixed-dim text-on-secondary-fixed font-headline-lg-mobile text-[18px] py-4 rounded-xl font-bold transition-all duration-300 neon-glow-mint active:scale-95 flex items-center justify-center gap-2" onclick="this.classList.add('animate-spin'); setTimeout(()=&gt;this.classList.remove('animate-spin'), 1000);">
<span class="material-symbols-outlined" data-icon="refresh">refresh</span>
                    إعادة المحاولة
                </button>
<button class="text-primary font-label-sm text-label-sm py-4 hover:bg-white/5 rounded-xl transition-all duration-200 active:scale-95">
                    عرض البيانات المحملة مسبقاً
                </button>
</div>
</div>
<!-- Status Details (Subtle) -->
<div class="mt-stack-lg flex gap-stack-md text-on-surface-variant/40 font-label-sm text-label-sm">
<div class="flex items-center gap-unit">
<span class="material-symbols-outlined text-[16px]" data-icon="wifi_off">wifi_off</span>
<span>Signal Lost</span>
</div>
<div class="flex items-center gap-unit">
<span class="material-symbols-outlined text-[16px]" data-icon="dns">dns</span>
<span>Server unreachable</span>
</div>
</div>
</main>
<!-- Background Atmospheric Particles (Purely Aesthetic) -->
<div class="fixed inset-0 pointer-events-none opacity-20 z-0">
<div class="absolute top-1/4 left-1/4 w-1 h-1 bg-secondary-fixed-dim rounded-full"></div>
<div class="absolute top-3/4 right-1/3 w-2 h-2 bg-primary blur-sm rounded-full animate-pulse"></div>
<div class="absolute bottom-1/4 left-1/2 w-1 h-1 bg-secondary-fixed-dim rounded-full"></div>
</div>
<script>
        // Micro-interaction for the "Retry" button
        const retryBtn = document.querySelector('button:nth-child(1)');
        retryBtn.addEventListener('click', () => {
            // Mocking a network check
            console.log('Attempting reconnection...');
        });

        // Simple parallax effect for the illustration
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            const img = document.querySelector('img');
            if(img) {
                img.style.transform = `translate(${moveX}px, ${moveY}px)`;
            }
        });
    </script>
</body></html>
