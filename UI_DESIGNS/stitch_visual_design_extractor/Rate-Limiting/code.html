<style>
body { background-color: #00180b; color: #e5e2e1; font-family: 'Manrope', sans-serif; overflow-x: hidden; } 
.glass-card { background: rgba(0, 33, 17, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); border-top-color: rgba(255, 255, 255, 0.3); } 
.neon-glow-mint { box-shadow: 0 0 40px rgba(0, 255, 133, 0.15); } 
.neon-text-mint { text-shadow: 0 0 10px rgba(54, 255, 139, 0.5); } 
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } 

@keyframes pulse-scan { 
    0% { opacity: 0.3; transform: scale(0.98); } 
    50% { opacity: 0.6; transform: scale(1); } 
    100% { opacity: 0.3; transform: scale(0.98); } 
} 
.scan-effect { animation: pulse-scan 3s infinite ease-in-out; } 

.clock-container { width: 100px; height: 100px; border-radius: 50%; position: relative; margin-bottom: 2rem; overflow: hidden; } 
.clock-marker { position: absolute; width: 2px; height: 8px; background: rgba(0, 33, 17, 0.6); left: 50%; transform-origin: 50% 50px; margin-left: -1px; z-index: 5; } 
.clock-hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom center; border-radius: 10px; transition: transform 0.1s linear; z-index: 15; } 
.countdown-hand { width: 4px; height: 45px; background: #002111; margin-left: -2px; } 
.clock-center { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; background: #002111; border-radius: 50%; transform: translate(-50%, -50%); z-index: 20; }

@keyframes pulse-expand {
    0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
    50% { opacity: 0.5; }
    100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
}
.pulse-circle {
    animation: pulse-expand 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}
.animate-delay-1000 { animation-delay: 1s; }
.animate-delay-2000 { animation-delay: 2s; }

.particle {
    position: absolute;
    background: #10b981;
    border-radius: 50%;
    pointer-events: none;
    box-shadow: 0 0 4px #10b981;
    animation: particle-behavior 6s ease-in-out infinite;
}

@keyframes particle-behavior {
    0% { opacity: 0; transform: translateY(0) scale(0.5); }
    20% { opacity: 0.6; }
    50% { transform: translateY(-30px) translateX(10px) scale(1.2); }
    80% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-60px) translateX(-10px) scale(0.5); }
}

<body class="flex flex-col min-h-screen items-center justify-center p-container-padding relative">
<!-- Dynamic Background Layer -->
<div class="fixed inset-0 pointer-events-none overflow-hidden z-0 bg-[#00180b]" id="particle-container">
<!-- Pulsing Circles -->

<div class="pulse-circle w-[300px] h-[300px] rounded-full border border-secondary-container/20"></div>
<div class="pulse-circle w-[500px] h-[500px] rounded-full border border-secondary-container/10 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 animate-delay-1000"></div>
<div class="pulse-circle w-[700px] h-[700px] rounded-full border border-secondary-container/5 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 animate-delay-2000"></div>
</div>
<!-- Atmospheric Glows -->
<div class="absolute -top-24 -left-24 w-96 h-96 bg-secondary-container/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-lg flex flex-col items-center text-center">
<!-- Analog Clock Section (Countdown) -->
<div class="clock-container" id="analog-clock" style="background: conic-gradient(rgb(0, 33, 17) 0deg, rgb(0, 33, 17) 0deg, rgb(54, 255, 139) 0deg) rgb(54, 255, 139); margin-bottom: 2rem; box-shadow: rgba(54, 255, 139, 0.3) 0px 0px 25px; border: 2px solid rgba(255, 255, 255, 0.2);">
<!-- Hour Markers -->
<div class="clock-marker" style="transform: rotate(0deg)"></div>
<div class="clock-marker" style="transform: rotate(30deg)"></div>
<div class="clock-marker" style="transform: rotate(60deg)"></div>
<div class="clock-marker" style="transform: rotate(90deg)"></div>
<div class="clock-marker" style="transform: rotate(120deg)"></div>
<div class="clock-marker" style="transform: rotate(150deg)"></div>
<div class="clock-marker" style="transform: rotate(180deg)"></div>

<button class="w-full py-4 rounded-lg border border-white/10 font-headline-lg-mobile text-body-md transition-all duration-300 flex items-center justify-center gap-2 bg-secondary-container text-on-primary-fixed font-bold hover:opacity-90 cursor-pointer" id="retry-button" style="box-shadow: rgba(0, 255, 133, 0.4) 0px 0px 20px;">
<span class="material-symbols-outlined text-[20px]">refresh</span>
            إعادة المحاولة
        </button>
<a class="inline-block py-2 font-label-sm text-label-sm text-on-surface-variant hover:text-secondary-container transition-colors duration-200 border-b border-transparent hover:border-secondary-container/30" href="#">
            اتصل بالدعم الفني
        </a>
</div>
</main>
<script>
    // Particle System Initialization
    (function initParticles() {
        const container = document.getElementById('particle-container');
        if (!container) return;
        
        const particleCount = 45;
        for (let i = 0; i < particleCount; i++) {
            createParticle(container);
        }
    })();

    function createParticle(container) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        // Random size between 1.5px and 4px
        const size = Math.random() * 2.5 + 1.5;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        
        // Random position
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        
        // Random animation delay and duration
        const duration = 4 + Math.random() * 6;
        const delay = Math.random() * 8;
        particle.style.animationDuration = `${duration}s`;
        particle.style.animationDelay = `${-delay}s`; // Start mid-animation
        
        container.appendChild(particle);
        
        // When animation ends, reposition and restart (using the same element for performance)
        particle.addEventListener('animationiteration', () => {
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
        });
    }

    // Rate limit countdown logic
    let timeLeft = 28;
    const totalTime = 28;
    const progressBar = document.getElementById('progress-bar');
    const countdownText = document.getElementById('countdown-text');
    const retryButton = document.getElementById('retry-button');
    const countdownHand = document.getElementById('countdown-hand');

    function updateTimer() {
        const progress = (timeLeft / totalTime) * 100;
        progressBar.style.width = progress + '%';
        countdownText.innerText = timeLeft + ' ثانية';

        const rotationDegrees = -((totalTime - timeLeft) / totalTime) * 360;
        countdownHand.style.transform = `rotate(${rotationDegrees}deg)`;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            countdownText.innerText = 'جاهز الآن';
            progressBar.style.width = '0%';
            countdownHand.style.transform = `rotate(-360deg)`;
            
            retryButton.disabled = false;
            retryButton.classList.remove('bg-white/5', 'text-on-surface-variant', 'cursor-not-allowed', 'opacity-50');
            retryButton.classList.add('bg-secondary-container', 'text-on-primary-fixed', 'font-bold', 'hover:opacity-90', 'cursor-pointer');
            retryButton.style.boxShadow = '0 0 20px rgba(0, 255, 133, 0.4)';
        }
    }

    updateTimer();

    const timerInterval = setInterval(() => {
        timeLeft--;
        updateTimer();
    }, 1000);

    retryButton.addEventListener('click', () => {
        if(!retryButton.disabled) {
            location.reload();
        }
    });
</script>
