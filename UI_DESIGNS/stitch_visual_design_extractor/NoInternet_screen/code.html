<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar" style=""><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&amp;family=Manrope:wght@400;500&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
        @keyframes pulse-ring {
            0% { transform: scale(0.33); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        @keyframes pulse-dot {
            0% { transform: scale(0.8); opacity: 0.8; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.8; }
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.1; transform: scale(0.8); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
        .animate-pulse-ring {
            animation: pulse-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        .animate-pulse-dot {
            animation: pulse-dot 2s cubic-bezier(0.455, 0.03, 0.515, 0.955) infinite;
        }
        .twinkle-dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background-color: #10b981;
            border-radius: 50%;
            animation: twinkle var(--duration, 3s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
        }
        .glass-card {
            backdrop-filter: blur(20px);
            background: rgba(0, 33, 17, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 255, 133, 0.05);
        }
        .neon-glow {
            box-shadow: 0 0 30px rgba(0, 255, 133, 0.2);
        }
        body {
            background-color: #002111;
            overflow: hidden;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#2d4d3a",
                        "primary-container": "#002111",
                        "on-secondary-fixed": "#00210c",
                        "on-primary-fixed": "#002111",
                        "on-primary": "#163725",
                        "secondary-container": "#36ff8b",
                        "error": "#ffb4ab",
                        "surface-variant": "#353534",
                        "surface-container-high": "#2a2a2a",
                        "background": "#131313",
                        "on-tertiary": "#690003",
                        "secondary-fixed-dim": "#00e476",
                        "secondary": "#f5fff2",
                        "inverse-on-surface": "#313030",
                        "surface-container": "#201f1f",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#ffb4aa",
                        "on-primary-container": "#698c75",
                        "primary-fixed": "#c6ebd1",
                        "outline": "#8c928c",
                        "surface-bright": "#3a3939",
                        "on-secondary-container": "#007238",
                        "on-secondary-fixed-variant": "#005227",
                        "inverse-primary": "#446651",
                        "inverse-surface": "#e5e2e1",
                        "on-surface-variant": "#c2c8c1",
                        "primary-fixed-dim": "#abcfb6",
                        "on-surface": "#e5e2e1",
                        "on-secondary": "#003919",
                        "tertiary-container": "#410001",
                        "on-background": "#e5e2e1",
                        "tertiary-fixed": "#ffdad5",
                        "surface-dim": "#131313",
                        "surface-container-low": "#1c1b1b",
                        "surface-container-highest": "#353534",
                        "on-tertiary-fixed-variant": "#930005",
                        "primary": "#abcfb6",
                        "on-tertiary-fixed": "#410001",
                        "on-tertiary-container": "#f9362c",
                        "secondary-fixed": "#61ff97",
                        "surface-container-lowest": "#0e0e0e",
                        "surface": "#131313",
                        "surface-tint": "#abcfb6",
                        "outline-variant": "#424843",
                        "tertiary": "#ffb4aa",
                        "error-container": "#93000a",
                        "on-error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "stack-md": "24px",
                        "gutter": "16px",
                        "stack-lg": "48px",
                        "stack-sm": "12px",
                        "container-padding": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "label-sm": ["JetBrains Mono"],
                        "headline-lg": ["Sora"],
                        "display-lg": ["Sora"],
                        "headline-lg-mobile": ["Sora"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-primary-container text-on-surface min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Dynamic Starfield Background Container -->
<div class="fixed inset-0 pointer-events-none z-0" id="starfield">
<!-- Manually placed initial dots for immediate rendering, JS will fill the rest -->
<div class="twinkle-dot" style="top: 15%; left: 10%; --duration: 4s; --delay: 1s;"></div>
<div class="twinkle-dot" style="top: 25%; left: 85%; --duration: 3s; --delay: 0.5s;"></div>
<div class="twinkle-dot" style="top: 70%; left: 15%; --duration: 5s; --delay: 2s;"></div>
<div class="twinkle-dot" style="top: 85%; left: 80%; --duration: 4s; --delay: 1.5s;"></div>
<div class="twinkle-dot" style="top: 40%; left: 50%; --duration: 6s; --delay: 3s;"></div>
</div>
<!-- Top App Bar (Shared Component Anchor) -->
<header class="fixed top-0 w-full z-50 flex items-center px-container-padding h-16">
</header>
<!-- Main Canvas -->
<main class="flex-grow flex items-center justify-center px-container-padding py-stack-lg relative overflow-hidden">
<!-- Ambient Bio-Atmosphere Background Elements -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-secondary-fixed/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-primary/5 rounded-full blur-[80px]"></div>
<div class="max-w-md w-full flex flex-col items-center text-center z-10">
<!-- Central Interactive Visual Element (Pulse Animation) -->
<div class="relative w-48 h-48 mb-stack-lg flex items-center justify-center">
<!-- Pulse Rings -->
<div class="absolute w-full h-full rounded-full border border-secondary-fixed/30 animate-pulse-ring"></div>
<div class="absolute w-full h-full rounded-full border border-secondary-fixed/20 animate-pulse-ring" style="animation-delay: 1s;"></div>
<div class="absolute w-full h-full rounded-full border border-secondary-fixed/10 animate-pulse-ring" style="animation-delay: 2s;"></div>
<!-- Center Bio-Metric Core -->
<div class="relative w-24 h-24 glass-card rounded-full flex items-center justify-center neon-glow border-secondary-fixed/40">
<div class="w-16 h-16 rounded-full bg-secondary-fixed/10 flex items-center justify-center animate-pulse-dot">
<span class="material-symbols-outlined text-secondary-fixed text-[40px]" data-icon="wifi_off">wifi_off</span>
</div>
</div>
<!-- Floating Data Particles -->
<div class="absolute top-0 right-4 w-2 h-2 bg-secondary-fixed rounded-full animate-bounce opacity-40"></div>
<div class="absolute bottom-8 left-0 w-1.5 h-1.5 bg-secondary-fixed rounded-full animate-pulse opacity-30"></div>
</div>
<!-- Feedback Content Section -->
<div class="space-y-stack-sm mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">الاتصال ضعيف حالياً</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto opacity-80 leading-relaxed">
                    يبدو أن سرعة الإنترنت منخفضة، قد تستغرق العملية وقتاً أطول من المعتاد.
                </p>
</div>
<!-- Action Area -->
<div class="w-full flex gap-4 flex-col"><!-- Primary Button (Disabled/Loading State) -->
<button class="w-full h-14 border border-white/5 text-on-surface rounded-xl flex items-center justify-center gap-2 cursor-not-allowed bg-white/10 backdrop-blur-md" disabled="">
<svg class="animate-spin h-5 w-5 text-primary" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
<path class="opacity-75" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" fill="currentColor"></path>
</svg>
<span class="font-body-md font-bold">يرجى الانتظار...</span>
</button>
<!-- Secondary Button (Refresh) -->
<button class="w-full h-14 border text-on-surface rounded-xl flex items-center justify-center gap-2 active:scale-95 transition-all font-bold group bg-transparent text-secondary-fixed hover:bg-secondary-fixed/10 border-secondary-fixed/40">
<span class="material-symbols-outlined text-[20px] group-hover:rotate-180 transition-transform duration-500">refresh</span>
<span class="font-body-md">إعادة المحاولة</span>
</button></div>
<!-- Connection Health Metric (Micro-UI) -->
<div class="mt-stack-lg glass-card px-4 py-2 rounded-full flex items-center gap-3">
<div class="flex gap-1">
<div class="w-1 h-3 bg-secondary-fixed/20 rounded-full"></div>
<div class="w-1 h-3 bg-secondary-fixed/20 rounded-full"></div>
<div class="w-1 h-3 bg-error/40 rounded-full animate-pulse"></div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Signal Strength: Critical</span>
</div>
</div>
</main>
<script>
        // Populate starfield with more dots
        const starfield = document.getElementById('starfield');
        const dotCount = 50;
        
        for (let i = 0; i < dotCount; i++) {
            const dot = document.createElement('div');
            dot.className = 'twinkle-dot';
            
            const top = Math.random() * 100;
            const left = Math.random() * 100;
            const duration = 2 + Math.random() * 4;
            const delay = Math.random() * 5;
            
            dot.style.top = `${top}%`;
            dot.style.left = `${left}%`;
            dot.style.setProperty('--duration', `${duration}s`);
            dot.style.setProperty('--delay', `${delay}s`);
            
            starfield.appendChild(dot);
        }

        // Simulate a connection check micro-interaction
        document.querySelector('button.group').addEventListener('click', function() {
            const btn = this;
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> <span class="font-body-md">جاري الفحص...</span>';
            btn.classList.add('opacity-50', 'pointer-events-none');
            
            setTimeout(() => {
                btn.innerHTML = originalContent;
                btn.classList.remove('opacity-50', 'pointer-events-none');
            }, 2000);
        });
    </script>
</body></html>
