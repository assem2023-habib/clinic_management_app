name: Flutter CI/CD

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  quality-gate:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

  build-android:
    name: Build Android + Firebase Distribution
    if: github.ref == 'refs/heads/main'
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Inject Firebase config
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - run: flutter pub get

      - run: flutter build apk --release

      - run: flutter build appbundle --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload to Firebase App Distribution
        run: |
          echo "$FIREBASE_SA" > service_account.json
          npm install -g firebase-tools
          firebase appdistribution:distribute \
            build/app/outputs/flutter-apk/app-release.apk \
            --app 1:891110545458:android:0047c578153252787bc42b \
            --service-account-file service_account.json \
            --groups testers
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  build-ios:
    name: Build iOS
    if: github.ref == 'refs/heads/main'
    needs: quality-gate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Inject Firebase config
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > ios/Runner/GoogleService-Info.plist

      - run: flutter pub get

      - run: flutter build ios --release --no-codesign

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
