name: clinic_management_app
description: "A comprehensive clinic management application for doctors, patients, and appointments."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.0
  bloc: ^9.1.0
  equatable: ^2.0.7
  intl: ^0.20.2
  table_calendar: ^3.2.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  firebase_core: ^4.9.0
  firebase_messaging: ^16.2.2
  firebase_auth: ^6.5.1
  firebase_database: ^12.4.1
  flutter_local_notifications: ^21.0.0
  dio: ^5.7.0
  uuid: ^4.5.1
  visibility_detector: ^0.4.0+2
  flutter_animate: ^4.5.2
  connectivity_plus: ^6.1.0
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  firebase_core_platform_interface: ^7.0.0

flutter:
  uses-material-design: true
